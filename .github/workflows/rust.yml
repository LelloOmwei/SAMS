name: Rust CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - thumbv7m-none-eabi    # ARM Cortex-M3/M4
          - thumbv8m.main-none-eabihf  # ARM Cortex-M33/M35P
          - x86_64-unknown-linux-gnu   # Linux x64
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: ${{ matrix.target }}
    
    - name: Install dependencies (Linux)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Build (Embedded)
      if: matrix.target != 'x86_64-unknown-linux-gnu'
      run: cargo build --target ${{ matrix.target }} --features embedded --release
    
    - name: Build (Linux)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: cargo build --target ${{ matrix.target }} --all-features --release
    
    - name: Run example
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: cargo run --example hello_atom --release

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Generate documentation
      run: cargo doc --all-features --no-deps
    
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: target/doc
